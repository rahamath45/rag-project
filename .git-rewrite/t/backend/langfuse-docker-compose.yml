services:
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: langfuse-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@langfuse-db:5432/langfuse
      - DATABASE_MIGRATION_ENABLED=true
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_ENABLED=true
      - REDIS_URL=redis://langfuse-redis:6379
      - NEXTAUTH_SECRET=langfuse-dev-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=salt-change-in-production
      - ENCRYPTION_KEY=encryption-key-change-in-production
      - SENTRY_DSN=
    depends_on:
      - langfuse-db
      - langfuse-redis
      - clickhouse

  langfuse-db:
    image: postgres:15-alpine
    container_name: langfuse-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=langfuse
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    volumes:
      - langfuse-redis-data:/data
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:23-alpine
    container_name: langfuse-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=langfuse
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=clickhouse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - langfuse-ch-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"

volumes:
  langfuse-pg-data:
  langfuse-redis-data:
  langfuse-ch-data: