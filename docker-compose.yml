version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8002:8001"
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend/rag-ui
    container_name: rag-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_data: